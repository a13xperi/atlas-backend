        sourceContent:
          type: string
          nullable: true
        blendId:
          type: string
          nullable: true
        feedback:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TeamDraftAuthor:
