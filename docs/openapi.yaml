openapi: 3.0.3
info:
  title: Atlas Backend API
  version: 0.1.0
  description: >
    OpenAPI documentation for the Atlas backend API. This spec covers the
    auth, users, voice, drafts, analytics, alerts, images, research, and
    trending routes exposed by the Express service.
servers:
  - url: /
    description: Current server
tags:
  - name: Health
  - name: Auth
  - name: Users
  - name: Voice
  - name: Drafts
  - name: Analytics
  - name: Alerts
  - name: Images
  - name: Research
  - name: Trending
security:
  - bearerAuth: []
paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check
      security: []
      responses:
        '200':
          description: Health status payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthCheckResponse'

  /api/auth/register:
    post:
      tags:
        - Auth
      summary: Register a user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: Registration succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/auth/login:
    post:
      tags:
        - Auth
      summary: Log in
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/auth/refresh:
    post:
      tags:
        - Auth
      summary: Refresh an access token
      description: >
        Accepts a refresh token from the request body or auth cookies. Legacy JWT
        clients may also send a Bearer token and receive a newly signed token.
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Token refresh succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefreshResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/auth/link-account:
    post:
      tags:
        - Auth
      summary: Link a handle-only account to email/password auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LinkAccountRequest'
      responses:
        '200':
          description: Account linked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/auth/logout:
    post:
      tags:
        - Auth
      summary: Log out
      responses:
        '200':
          description: Auth cookies cleared
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/me:
    get:
      tags:
        - Auth
      summary: Get the current user
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/auth/sessions:
    get:
      tags:
        - Auth
      summary: List active sessions
      deprecated: true
      responses:
        '200':
          description: Active sessions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/auth/sessions/{id}:
    delete:
      tags:
        - Auth
      summary: Revoke a session
      deprecated: true
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Session revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/users/profile:
    get:
      tags:
        - Users
      summary: Get the authenticated user's profile
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      tags:
        - Users
      summary: Update the authenticated user's profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserProfileRequest'
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/users/team:
    get:
      tags:
        - Users
      summary: List all analysts for manager/admin views
      responses:
        '200':
          description: Team members
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamUsersResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/users/push-top-profiles:
    post:
      tags:
        - Users
      summary: Push top-performing voice dimensions to inactive analysts
      responses:
        '200':
          description: Action completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionResultResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/users/send-nudge:
    post:
      tags:
        - Users
      summary: Send inactive analyst nudges
      responses:
        '200':
          description: Action completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionResultResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/users/push-style:
    post:
      tags:
        - Users
      summary: Push a manager-selected style to all analysts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PushStyleRequest'
      responses:
        '200':
          description: Action completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionResultResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/voice/profile:
    get:
      tags:
        - Voice
      summary: Get the authenticated user's voice profile
      responses:
        '200':
          description: Voice profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VoiceProfileResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      tags:
        - Voice
      summary: Update voice dimensions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateVoiceProfileRequest'
      responses:
        '200':
          description: Updated voice profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VoiceProfileResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/voice/references:
    get:
      tags:
        - Voice
      summary: List active reference voices
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
      responses:
        '200':
          description: Reference voices
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReferenceVoicesResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Voice
      summary: Create a reference voice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReferenceVoiceRequest'
      responses:
        '200':
          description: Reference voice created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReferenceVoiceEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/voice/blends:
    get:
      tags:
        - Voice
      summary: List saved blends
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
      responses:
        '200':
          description: Saved blends
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlendsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Voice
      summary: Create a saved blend
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBlendRequest'
      responses:
        '200':
          description: Blend created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlendEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/voice/blends/{blendId}/voices/{voiceId}:
    patch:
      tags:
        - Voice
      summary: Update a voice entry inside a blend
      parameters:
        - $ref: '#/components/parameters/BlendIdParam'
        - $ref: '#/components/parameters/VoiceIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBlendVoiceRequest'
      responses:
        '200':
          description: Updated blend voice
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlendVoiceEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - Voice
      summary: Remove a voice entry from a blend
      parameters:
        - $ref: '#/components/parameters/BlendIdParam'
        - $ref: '#/components/parameters/VoiceIdParam'
      responses:
        '200':
          description: Blend voice deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/voice/calibrate:
    post:
      tags:
        - Voice
      summary: Calibrate the current voice profile from a Twitter handle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CalibrateVoiceRequest'
      responses:
        '200':
          description: Voice profile calibrated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VoiceCalibrationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '502':
          $ref: '#/components/responses/BadGateway'

  /api/drafts/generate:
    post:
      tags:
        - Drafts
      summary: Generate a tweet draft from source content
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateDraftRequest'
      responses:
        '200':
          description: Draft generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DraftEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '502':
          $ref: '#/components/responses/BadGateway'
        '504':
          $ref: '#/components/responses/GatewayTimeout'

  /api/drafts/{id}/regenerate:
    post:
      tags:
        - Drafts
      summary: Regenerate a draft version
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegenerateDraftRequest'
      responses:
        '200':
          description: Draft regenerated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DraftEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/BadGateway'
        '504':
          $ref: '#/components/responses/GatewayTimeout'

  /api/drafts/{id}/refine:
    post:
      tags:
        - Drafts
      summary: Refine a draft with a natural-language instruction
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefineDraftRequest'
      responses:
        '200':
          description: Draft refined
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DraftEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/BadGateway'
        '504':
          $ref: '#/components/responses/GatewayTimeout'

  /api/drafts:
    get:
      tags:
        - Drafts
      summary: List the authenticated user's drafts
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
        - $ref: '#/components/parameters/DraftStatusQueryParam'
      responses:
        '200':
          description: Draft list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DraftListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Drafts
      summary: Create a manual draft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDraftRequest'
      responses:
        '200':
          description: Draft created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DraftEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/drafts/team:
    get:
      tags:
        - Drafts
      summary: List approved and posted team drafts
      parameters:
        - $ref: '#/components/parameters/TeamLimitParam'
        - $ref: '#/components/parameters/OffsetParam'
      responses:
        '200':
          description: Team drafts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamDraftListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/drafts/{id}:
    get:
      tags:
        - Drafts
      summary: Get a single draft
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Draft details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DraftEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      tags:
        - Drafts
      summary: Update draft content, status, or feedback
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDraftRequest'
      responses:
        '200':
          description: Draft updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DraftEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - Drafts
      summary: Delete a draft
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Draft deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/drafts/{id}/engagement:
    post:
      tags:
        - Drafts
      summary: Record post-publish engagement metrics
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordEngagementRequest'
      responses:
        '200':
          description: Engagement recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DraftEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/analytics/summary:
    get:
      tags:
        - Analytics
      summary: Get a 30-day analytics summary
      responses:
        '200':
          description: Summary metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsSummaryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/analytics/learning-log:
    post:
      tags:
        - Analytics
      summary: Create a learning log entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLearningLogRequest'
      responses:
        '200':
          description: Entry created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LearningLogEnvelope'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      tags:
        - Analytics
      summary: List recent learning log entries
      responses:
        '200':
          description: Learning log entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LearningLogListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/analytics/engagement:
    get:
      tags:
        - Analytics
      summary: List recent engagement events
      responses:
        '200':
          description: Engagement events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsEventsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/analytics/engagement-daily:
    get:
      tags:
        - Analytics
      summary: Compare predicted versus actual engagement by day
      responses:
        '200':
          description: Daily engagement points
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EngagementDailyResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/analytics/activity-daily:
    get:
      tags:
        - Analytics
      summary: Get a 30-day activity sparkline
      responses:
        '200':
          description: Daily activity points
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityDailyResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/analytics/team-engagement-daily:
    get:
      tags:
        - Analytics
      summary: Get daily team engagement metrics
      responses:
        '200':
          description: Team engagement points
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamEngagementDailyResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/analytics/days-to-peak:
    get:
      tags:
        - Analytics
      summary: Measure days-to-peak engagement per analyst
      responses:
        '200':
          description: Days-to-peak metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaysToPeakResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/analytics/team:
    get:
      tags:
        - Analytics
      summary: Get team analytics for all analysts
      responses:
        '200':
          description: Analyst metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsTeamResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/alerts/subscriptions:
    get:
      tags:
        - Alerts
      summary: List alert subscriptions
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
      responses:
