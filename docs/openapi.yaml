        - delivery
        - createdAt
      properties:
        id:
          type: string
        userId:
          type: string
        type:
          $ref: '#/components/schemas/AlertSubscriptionType'
        value:
          type: string
        isActive:
          type: boolean
        delivery:
          type: array
          items:
            $ref: '#/components/schemas/AlertDelivery'
        createdAt:
          type: string
          format: date-time

    Alert:
