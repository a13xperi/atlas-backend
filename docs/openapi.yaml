components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    LimitParam:
      name: limit
      in: query
      description: Max number of records to return
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    TeamLimitParam:
      name: limit
      in: query
      description: Max number of records to return
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50
    OffsetParam:
      name: offset
      in: query
      description: Number of records to skip
      schema:
        type: integer
        minimum: 0
        default: 0
    DraftStatusQueryParam:
      name: status
      in: query
      description: Optional draft status filter
      schema:
        $ref: '#/components/schemas/DraftStatus'
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
    DraftIdParam:
      name: draftId
      in: path
      required: true
      schema:
        type: string
    BlendIdParam:
      name: blendId
      in: path
      required: true
      schema:
        type: string
    VoiceIdParam:
      name: voiceId
      in: path
      required: true
      schema:
        type: string

  responses:
    BadRequest:
      description: Invalid request payload or parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Authenticated but not allowed to perform this action
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Requested resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Resource conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BadGateway:
      description: Upstream AI/provider request failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    GatewayTimeout:
      description: Upstream processing timed out
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServiceUnavailable:
      description: Dependent service unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      required:
        - ok
        - error
        - timestamp
      properties:
        ok:
          type: boolean
          enum:
            - false
        error:
          type: string
        details:
          nullable: true
          description: Additional validation or provider-specific detail payload.
        timestamp:
          type: string
          format: date-time

    SuccessEnvelope:
      type: object
      required:
        - ok
        - timestamp
      properties:
        ok:
          type: boolean
          enum:
            - true
        timestamp:
          type: string
          format: date-time

    SuccessResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          required:
            - data
          properties:
            data:
              type: object
              required:
                - success
              properties:
                success:
                  type: boolean

    MessageResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          required:
            - data
          properties:
            data:
              type: object
              required:
                - message
              properties:
                message:
                  type: string

    ActionResultResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          required:
            - data
          properties:
            data:
              type: object
              required:
                - message
                - affected
              properties:
                message:
                  type: string
                affected:
                  type: integer

    HealthCheckResponse:
      type: object
      required:
        - status
        - timestamp
        - uptime
        - version
        - checks
      properties:
        status:
          type: string
          enum:
            - ok
            - degraded
        timestamp:
          type: string
          format: date-time
        uptime:
          type: integer
        version:
          type: string
        checks:
          type: object
          required:
            - database
            - redis
            - memory
          properties:
            database:
              $ref: '#/components/schemas/TimedHealthCheck'
            redis:
              $ref: '#/components/schemas/TimedHealthCheck'
            memory:
              $ref: '#/components/schemas/MemoryHealthCheck'

    TimedHealthCheck:
      type: object
      required:
        - status
        - latencyMs
      properties:
        status:
          type: string
          enum:
            - ok
            - error
        latencyMs:
          type: integer

    MemoryHealthCheck:
      type: object
      required:
        - heapUsedMB
        - heapTotalMB
        - rss
      properties:
        heapUsedMB:
          type: number
          format: float
        heapTotalMB:
          type: number
          format: float
        rss:
          type: integer

    Role:
      type: string
      enum:
        - ANALYST
        - MANAGER
        - ADMIN

    OnboardingTrack:
      type: string
      enum:
        - TRACK_A
        - TRACK_B

    OnboardingTrackChoice:
      type: string
      enum:
        - A
        - B

    VoiceMaturity:
      type: string
      enum:
        - BEGINNER
        - INTERMEDIATE
        - ADVANCED

    DraftStatus:
      type: string
      enum:
        - DRAFT
        - APPROVED
        - POSTED
        - ARCHIVED

    SourceType:
      type: string
      enum:
        - REPORT
        - ARTICLE
        - TWEET
        - TRENDING_TOPIC
        - VOICE_NOTE
        - MANUAL

    AnalyticsType:
      type: string
      enum:
        - DRAFT_CREATED
        - DRAFT_POSTED
        - FEEDBACK_GIVEN
        - VOICE_REFINEMENT
        - REPORT_INGESTED
        - ENGAGEMENT_RECORDED
        - SESSION_START
        - RESEARCH_CONDUCTED
        - ALERT_GENERATED
        - IMAGE_GENERATED

    AlertSubscriptionType:
      type: string
      enum:
        - CATEGORY
        - ACCOUNT
        - REPORT_TYPE

    AlertDelivery:
      type: string
      enum:
        - PORTAL
        - TELEGRAM

    ImageStyle:
      type: string
      enum:
        - infographic
        - quote_card
        - avatar
        - thumbnail

    Sentiment:
      type: string
      enum:
        - bullish
        - bearish
        - neutral
        - mixed

    AuthUser:
      type: object
      required:
        - id
        - handle
        - role
      properties:
        id:
          type: string
        handle:
          type: string
        role:
          $ref: '#/components/schemas/Role'

    VoiceProfile:
      type: object
      required:
        - id
        - userId
        - humor
        - formality
        - brevity
        - contrarianTone
        - maturity
        - tweetsAnalyzed
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        userId:
          type: string
        humor:
          type: integer
          minimum: 0
          maximum: 100
        formality:
          type: integer
          minimum: 0
          maximum: 100
        brevity:
          type: integer
          minimum: 0
          maximum: 100
        contrarianTone:
          type: integer
          minimum: 0
          maximum: 100
        maturity:
          $ref: '#/components/schemas/VoiceMaturity'
        tweetsAnalyzed:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UserProfile:
      type: object
      required:
        - id
        - handle
        - role
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        supabaseId:
          type: string
          nullable: true
        handle:
          type: string
        email:
          type: string
          format: email
          nullable: true
        displayName:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        role:
          $ref: '#/components/schemas/Role'
        onboardingTrack:
          allOf:
            - $ref: '#/components/schemas/OnboardingTrack'
          nullable: true
        telegramChatId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        voiceProfile:
          allOf:
            - $ref: '#/components/schemas/VoiceProfile'
          nullable: true

    TeamCount:
      type: object
      required:
        - tweetDrafts
        - sessions
      properties:
        tweetDrafts:
          type: integer
        sessions:
          type: integer

    AnalyticsTeamCount:
      type: object
      required:
        - tweetDrafts
        - analyticsEvents
        - sessions
      properties:
        tweetDrafts:
          type: integer
        analyticsEvents:
          type: integer
        sessions:
          type: integer

    TeamUser:
      allOf:
        - $ref: '#/components/schemas/UserProfile'
        - type: object
          required:
            - _count
          properties:
            _count:
              $ref: '#/components/schemas/TeamCount'

    AnalyticsTeamUser:
      allOf:
        - $ref: '#/components/schemas/UserProfile'
        - type: object
          required:
            - _count
          properties:
            _count:
              $ref: '#/components/schemas/AnalyticsTeamCount'

    Session:
      type: object
      required:
        - id
        - createdAt
        - expiresAt
      properties:
        id:
          type: string
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time

    ReferenceVoice:
      type: object
      required:
        - id
        - userId
        - name
        - isActive
        - createdAt
      properties:
        id:
          type: string
        userId:
          type: string
        name:
          type: string
        handle:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time

    BlendVoice:
      type: object
