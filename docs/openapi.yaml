        - label
        - percentage
      properties:
        id:
          type: string
        blendId:
          type: string
        referenceVoiceId:
          type: string
          nullable: true
        label:
          type: string
        percentage:
          type: integer
        referenceVoice:
          allOf:
            - $ref: '#/components/schemas/ReferenceVoice'
          nullable: true

    SavedBlend:
      type: object
      required:
        - id
        - userId
        - name
        - voices
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        userId:
          type: string
        name:
          type: string
        voices:
          type: array
          items:
            $ref: '#/components/schemas/BlendVoice'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    EngagementMetrics:
      type: object
      required:
        - likes
        - retweets
        - impressions
      properties:
        likes:
          type: integer
          minimum: 0
        retweets:
          type: integer
          minimum: 0
        impressions:
          type: integer
          minimum: 0

    TweetDraft:
      type: object
      required:
        - id
