          type: string
        type:
          type: string
        title:
          type: string
        context:
          type: string
          nullable: true
        draftReply:
          type: string
          nullable: true
        sourceUrl:
          type: string
          nullable: true
        sentiment:
          type: string
          nullable: true
        relevance:
          type: number
          format: float
          nullable: true
        userId:
          type: string
          nullable: true
        expiresAt:
